name: trackinstudio
services:
   trackinstudio:
      build:
         context: .
         dockerfile: Dockerfile
      container_name: trackinstudio
      restart: unless-stopped
      env_file:
         - .env
      environment:
         PS_DOMAIN: ${PS_DOMAIN}
         PS_FOLDER_ADMIN: ${PS_FOLDER_ADMIN}
         PS_INSTALL_AUTO: 1
         PS_LANGUAGE: fr
         PS_DEV_MODE: ${PS_DEV_MODE}
         PS_ENABLE_SSL: 1
         PS_TRUSTED_PROXIES: 'private_ranges'
         DB_SERVER: ${DB_SERVER}
         DB_NAME: ${DB_NAME}
         DB_USER: ${DB_USER}
         DB_PASSWD: ${DB_PASSWD}
         DB_PREFIX: ps_
         ADMIN_MAIL: ${ADMIN_MAIL}
         ADMIN_PASSWD: ${ADMIN_PASSWD}
      volumes:
         # Bind mounts : code custom (modifiable depuis l'hôte)
         - type: bind
           source: ./modules/trackinstudio_contentblocks
           target: /var/www/html/modules/trackinstudio_contentblocks
         - type: bind
           source: ./themes/trackinstudio
           target: /var/www/html/themes/trackinstudio
         # Volumes nommés : données persistantes "dans le container"
         - psdata:/var/www/html
      networks:
         - web-network
      mem_limit: 4g
      cpus: 2.0

volumes:
   psdata:

networks:
   web-network:
      external: true
