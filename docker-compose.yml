ervices:
   trackinstudio:
      container_name: trackinstudio
      restart: unless-stopped
      env_file:
         - .env
      environment:
         DB_SERVER: ${DB_SERVER}
         DB_NAME: ${DB_NAME}
         DB_USER: ${DB_USER}
         DB_PASSWD: ${DB_PASSWD}
         DB_PREFIX: ps_
         PS_DOMAIN: ${PS_DOMAIN}
         PS_FOLDER_ADMIN: ${PS_FOLDER_ADMIN}
         PS_INSTALL_AUTO: 1
         PS_COUNTRY: fr
         PS_LANGUAGE: fr
         PS_ENABLE_SSL: 1
         PS_DEV_MODE: ${PS_DEV_MODE}
         ADMIN_MAIL: ${ADMIN_MAIL}
         ADMIN_PASSWD: ${ADMIN_PASSWD}
      volumes:
         - ./:/var/www/html # tout le projet à la racine
      networks:
         - web-network
networks:
   web-network:
      external: true
